name: Update Steam game data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 19 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Steam data
        run: python tools/fetch_steam_data.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Steam game data"
          file_pattern: games.json
